name: install-smoke

on:
  push:
    branches: [0.x]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-unix:
    name: Unix installer smoke (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-14]
    steps:
      - name: smoke - checkout
        uses: actions/checkout@v4

      - name: smoke - setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: smoke - build local binary
        working-directory: packages/lazyaif
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out"
          bun install --frozen-lockfile
          arch_norm=$(uname -m)
          case "$arch_norm" in
            x86_64|amd64) arch_norm="x64" ;;
            aarch64|arm64) arch_norm="arm64" ;;
          esac
          os_norm=$(uname -s | tr '[:upper:]' '[:lower:]')
          bun build --compile bin/lazyaif.ts \
            --define "process.env.LAZYAIF_VERSION=\"smoke\"" \
            --outfile "$GITHUB_WORKSPACE/out/lazyaif-smoke-$os_norm-$arch_norm"
          ls -la "$GITHUB_WORKSPACE/out/"

      - name: smoke - verify binary launches
        env:
          LAZYAIF_INSTALL_DEBUG: "1"
        run: |
          arch_norm=$(uname -m)
          case "$arch_norm" in
            x86_64|amd64) arch_norm="x64" ;;
            aarch64|arm64) arch_norm="arm64" ;;
          esac
          os_norm=$(uname -s | tr '[:upper:]' '[:lower:]')
          asset="lazyaif-smoke-$os_norm-$arch_norm"
          chmod +x "out/$asset"
          ./out/$asset --version
          echo "[smoke] binary OK"

  smoke-windows:
    name: Windows installer smoke
    runs-on: windows-latest
    steps:
      - name: smoke - checkout
        uses: actions/checkout@v4

      - name: smoke - setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: smoke - build local binary
        working-directory: packages/lazyaif
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/out" | Out-Null
          bun install --frozen-lockfile
          bun build --compile bin/lazyaif.ts `
            --define "process.env.LAZYAIF_VERSION=`"smoke`"" `
            --outfile "$env:GITHUB_WORKSPACE/out/lazyaif-smoke-windows-x64.exe"
          Get-ChildItem "$env:GITHUB_WORKSPACE/out/"
        shell: pwsh

      - name: smoke - verify binary launches
        env:
          LAZYAIF_INSTALL_DEBUG: "1"
        run: |
          & "$env:GITHUB_WORKSPACE/out/lazyaif-smoke-windows-x64.exe" --version
          Write-Host "[smoke] binary OK"
        shell: pwsh